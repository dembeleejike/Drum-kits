<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drum Kit</title>
  <link rel="stylesheet" href="drum.css"/>
</head>

<body>

  <h1 class="title">🥁 Let's Have Fun!</h1>

  <div class="drum-container">
    <button class="w drum">w</button>
    <button class="a drum">a</button>
    <button class="s drum">s</button>
    <button class="d drum">d</button>
    <button class="j drum">j</button>
    <button class="k drum">k</button>
    <button class="i drum">i</button>
  </div>

<script>

const sounds = {
  w: new Audio("sounds/Ton1.wav"),
  a: new Audio("sounds/Ton2.wav"),
  s: new Audio("sounds/Ton3.wav"),
  d: new Audio("sounds/Ton4.wav"),
  j: new Audio("sounds/snare5.wav"),
  k: new Audio("sounds/crash6.wav"),
  i: new Audio("sounds/kick-bass7.wav"),
};

const buttons = document.querySelectorAll(".drum");

// CLICK
buttons.forEach(btn => {
  btn.addEventListener("click", function () {
    playSound(this.innerText.trim());
    animate(this.innerText.trim());
  });
});


document.addEventListener("keydown", function (event) {
  playSound(event.key);
  animate(event.key);
});

function playSound(key) {
  const audio = sounds[key];
  if (!audio) return;
  audio.currentTime = 0;
  audio.play();
}

function animate(key) {
  const active = document.querySelector("." + key);
  if (!active) return;
  active.classList.add("pressed");
  setTimeout(() => active.classList.remove("pressed"), 150);
}
</script>

</body>
</html>
